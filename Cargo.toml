[package]
name = "neuro-fed-node"
version = "0.1.0"
edition = "2021"
authors = ["NeuroFed Team"]
description = "Decentralized Federated Nervous System with Pure Hierarchical Predictive Coding"
license = "MIT"
repository = "https://github.com/neuro-fed/neuro-fed-node"

[dependencies]
# Core dependencies
ndarray = "0.17.2"
ndarray-linalg = "0.18.0"
candle-core = { version = "0.9.2", features = ["mkl"], default-features = false }
candle-nn = { version = "0.9.2" }
candle-transformers = { version = "0.9.2" }
notify = "8.2.0"
automerge = "0.7.4"
ring = "0.17.14"
axum = "0.8.8"
reqwest = { version = "0.13.2", features = ["json"], default-features = false }
tokio = { version = "1.0", features = ["full"] }

# Nostr protocol
nostr-sdk = "0.44.1"

# Configuration and persistence
config = "0.15.19"
sqlx = { version = "0.8.6", features = ["runtime-tokio-rustls", "sqlite", "chrono", "uuid"] }

# Utilities
chrono = "0.4"
uuid = { version = "1.0", features = ["v4"] }
log = "0.4"
simplelog = "0.12"

# PC Hierarchy specific dependencies
thiserror = "2.0.18"
rand = "0.10.0"
rayon = "1.0"
serde = { version = "1.0", features = ["derive"] }
rand_distr = "0.6.0"

# Tracing for logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Optional for web UI (Phase 3)
tauri = { version = "2.10.2", optional = true }

[features]
default = []
