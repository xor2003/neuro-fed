[package]
name = "neuro-fed-node"
version = "0.1.0"
edition = "2024"
authors = ["NeuroFed Team"]
description = "Decentralized Federated Nervous System with Pure Hierarchical Predictive Coding"
license = "MIT"
repository = "https://github.com/neuro-fed/neuro-fed-node"

[dependencies]

# Core dependencies

ndarray = "0.17.2"
ndarray-linalg = "0.18.1"
candle-core = { version = "0.9.2", features = ["mkl"], default-features = false }
candle-nn = { version = "0.9.2" }
candle-transformers = { version = "0.9.2" }
anyhow = "1.0"
notify = "8.2.0"
automerge = "0.7.4"
ring = "0.17.8"
axum = "0.8.8"
reqwest = { version = "0.13.2", features = ["json", "stream"], default-features = false }
serde_json = "1.0.117"
tokio = { version = "1.37.0", features = ["full"] }

# Nostr protocol

nostr-sdk = "0.44.1"

# Federation dependencies
secp256k1 = "0.32.0-beta.2"
bitcoin = { version = "0.32.0", features = ["std"], optional = true }
lightning = { version = "0.2.0", optional = true }
rand = "0.8.5"

# Configuration and persistence

config = "0.15.19"
sqlx = { version = "0.8.6", features = ["runtime-tokio-rustls", "sqlite", "chrono", "uuid"] }

# Utilities

chrono = "0.4.38"
uuid = { version = "1.8.0", features = ["v4"] }
log = "0.4.21"
simplelog = "0.12.2"
async-trait = "0.1.80"

# PC Hierarchy specific dependencies

thiserror = "2.0.18"

# Hashing for cache keys
sha2 = "0.10.8"

# Brain sharing (safetensors for model weights)
safetensors = "0.4.3"
hex = "0.4.3"

# Model Manager dependencies
futures = "0.3.30"

# Privacy networks (optional, placeholder versions for simulation)
yggdrasil = { version = "0.1.0", optional = true }
tor = { version = "0.1.0", optional = true }
i2p = { version = "0.0.1", optional = true }
url = "2.5.0"
base64 = "0.22.0"



















































































rand_distr = "0.6.0"
rayon = "1.10.0"

serde = { version = "1.0.203", features = ["derive"] }

# Serialization for ndarray and DateTime

ndarray-rand = "0.16.0"
serde_with = "3.8.1"

# Tracing for logging

tracing = "0.1.40"
tracing-subscriber = "0.3.18"

# Web server dependencies

axum-server = "0.8.0"

# Optional for web UI (Phase 3)

tauri = { version = "2.0.0-beta.13", optional = true }


[dev-dependencies]
tempfile = "3.10.2"

[features]
default = []
privacy = ["yggdrasil", "tor", "i2p"]
federation = ["bitcoin", "lightning"]
virality = []
web-ui = ["tauri"]
vulkan = []





















[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
opt-level = 1
incremental = true
codegen-units = 256
